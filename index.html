<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lista de Tarefas</title>
</head>
<body>

    <header id="header">
        <h1 id="title">Todo<span>List</span></h1>
    </header>

    <main id="app">

        <section id="section-one">
            <label id="label" for="tarefa">Adicionar Tarefa:</label>
            <input type="text" name="tarefa" id="tarefa" placeholder="Nome da tarefa">

            <button id="button">Adicionar</button>
        </section>

        <section id="section-two">
            <ul id="list"></ul>
        </section>
    
        <script src="script.js"></script>
    </main>
</body>
</html>
